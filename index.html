<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ultimate Jungle VR Theme Park</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #88ccee" fog="type: exponential; color: #88ccee; density: 0.02">

      <!-- Ground -->
      <a-plane rotation="-90 0 0" width="500" height="500" color="#2f7d32"></a-plane>

      <!-- Player -->
      <a-entity camera look-controls wasd-controls position="0 1.6 5"></a-entity>

      <!-- Jungle Trees -->
      <a-entity gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Tree/glTF/Tree.gltf" position="-5 0 -10" scale="2 2 2"></a-entity>
      <a-entity gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Tree/glTF/Tree.gltf" position="3 0 -6" scale="1.5 1.5 1.5"></a-entity>

      <!-- Animals -->
      <a-entity gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Elephant/glTF/Elephant.gltf" position="-3 0 -5" scale="0.5 0.5 0.5" 
                animation="property: position; to:-3 0 -7; dir: alternate; dur:4000; loop:true"></a-entity>
      <a-entity gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Panda/glTF/Panda.gltf" position="2 0 -4" scale="0.5 0.5 0.5"
                animation="property: position; to:2 0 -6; dir: alternate; dur:3000; loop:true"></a-entity>
      <a-entity gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Giraffe/glTF/Giraffe.gltf" position="4 0 -2" scale="0.5 0.5 0.5"
                animation="property: position; to:4 0 -4; dir: alternate; dur:5000; loop:true"></a-entity>

      <!-- Rollercoaster -->
      <a-entity id="rollercoaster" position="0 1 -10">
        <a-box color="gray" depth="20" height="0.5" width="1"></a-box>
        <a-entity id="cart" gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Cube/glTF/Cube.gltf" position="0 1 0"
                  animation="property: position; to:0 1 -20; dur:8000; loop:true; easing: linear"></a-entity>
      </a-entity>

      <!-- Zipline -->
      <a-box position="5 5 -5" depth="0.5" height="0.5" width="8" color="orange"></a-box>
      <a-entity id="ziplineCart" gltf-model="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/Cube/glTF/Cube.gltf"
                position="1 5 -5" animation="property: position; to:9 3 -10; dur:5000; loop:true; easing: linear"></a-entity>

      <!-- Ocean / Beach -->
      <a-plane position="10 0 -20" rotation="-90 0 0" width="30" height="30" color="#3399ff"></a-plane>

      <!-- Waterfall placeholder -->
      <a-box position="-6 3 -8" height="6" width="1" depth="1" color="#3399ff"></a-box>

      <!-- Carousel placeholder -->
      <a-cylinder position="0 0 -15" radius="3" height="0.2" color="#ffcc00" rotation="0 0 0"
                  animation="property: rotation; to:0 360 0; dur:8000; loop:true; easing: linear"></a-cylinder>

      <!-- Sky & ambient sound -->
      <a-sky color="#88ccee"></a-sky>

    </a-scene>
  </body>
</html>
