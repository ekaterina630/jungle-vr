<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ultimate Jungle VR Theme Park</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Sky & ground -->
      <a-sky color="#88ccee"></a-sky>
      <a-plane rotation="-90 0 0" width="500" height="500" color="#2f7d32"></a-plane>

      <!-- Player camera -->
      <a-entity camera look-controls wasd-controls position="0 1.6 5"></a-entity>

      <!-- Rollercoaster track placeholder -->
      <a-box position="0 1 -10" depth="20" height="0.5" width="1" color="gray"></a-box>
      <a-text value="🎢 Rollercoaster Start" position="-2 3 -10" color="white"></a-text>

      <!-- Zipline placeholder -->
      <a-box position="5 5 -5" depth="0.5" height="0.5" width="8" color="orange"></a-box>
      <a-text value="🪂 Zipline" position="5 6 -5" color="white"></a-text>

      <!-- Animals -->
      <a-sphere position="-3 1 -3" radius="0.5" color="gray">
        <a-animation attribute="position" to="-3 1 -5" direction="alternate" dur="2000" repeat="indefinite"></a-animation>
      </a-sphere>
      <a-text value="🐘 Elephant" position="-3 2 -3" color="white"></a-text>

      <a-sphere position="2 1 -4" radius="0.4" color="black">
        <a-animation attribute="position" to="2 1 -6" direction="alternate" dur="1500" repeat="indefinite"></a-animation>
      </a-sphere>
      <a-text value="🐼 Panda" position="2 2 -4" color="white"></a-text>

      <a-sphere position="4 1 -2" radius="0.6" color="#d2b48c">
        <a-animation attribute="position" to="4 1 -4" direction="alternate" dur="3000" repeat="indefinite"></a-animation>
      </a-sphere>
      <a-text value="🦒 Giraffe" position="4 2 -2" color="white"></a-text>

      <a-sphere position="-1 1 -6" radius="0.3" color="brown">
        <a-animation attribute="position" to="-1 1 -8" direction="alternate" dur="1500" repeat="indefinite"></a-animation>
      </a-sphere>
      <a-text value="🐒 Monkey" position="-1 2 -6" color="white"></a-text>

      <a-sphere position="0 3 -5" radius="0.2" color="red">
        <a-animation attribute="position" to="0 3 -7" direction="alternate" dur="1000" repeat="indefinite"></a-animation>
      </a-sphere>
      <a-text value="🦜 Parrot" position="0 3.5 -5" color="white"></a-text>

      <!-- Beach & water placeholder -->
      <a-plane position="10 0 -20" rotation="-90 0 0" width="30" height="30" color="#3399ff"></a-plane>
      <a-text value="🌊 Beach & Ocean" position="10 1 -20" color="white"></a-text>

    </a-scene>
  </body>
</html>
